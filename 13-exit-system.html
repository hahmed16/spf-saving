<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخروج من النظام - نظام الادخار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-user-role="saver">
    <div id="navbarPlaceholder"></div>
    <div id="sidebarPlaceholder"></div>

    <main class="spf-main">
        <div class="page-header">
            <div>
                <h4>الخروج من نظام الادخار الاختياري</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="01-dashboard.html">لوحة التحكم</a></li>
                        <li class="breadcrumb-item active">خروج نهائي</li>
                    </ol>
                </nav>
            </div>
            <div class="user-info-badge">
                <span class="current-role-badge badge user-type-badge saver">المدخر</span>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-12">
                <div class="spf-card border-danger">
                    <div class="card-body p-0">
                        <div class="row g-0">
                            <div class="col-md-5 p-4 border-start">
                                <h6 class="fw-800 text-danger mb-3"><i class="fas fa-exclamation-triangle me-2"></i> تبعات الخروج النهائي</h6>
                                <ul class="list-group list-group-flush small mb-4">
                                    <li class="list-group-item"><i class="fas fa-arrow-left me-2 text-danger"></i> إغلاق الحساب وتصفية كافة المبالغ.</li>
                                    <li class="list-group-item"><i class="fas fa-arrow-left me-2 text-danger"></i> التوقف عن استحقاق العوائد المستقبلية.</li>
                                </ul>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="confirmExit">
                                    <label class="form-check-label ms-2 fw-700 text-spf-dark" for="confirmExit">أقر بفهم تبعات إغلاق الحساب نهائياً.</label>
                                </div>
                            </div>
                            <div class="col-md-7 p-4 bg-light">
                                <h6 class="fw-800 text-spf-dark mb-3">ملخص التسوية النهائية</h6>
                                <div class="row g-3 small mb-3">
                                    <div class="col-6">إجمالي الإيداعات: <strong>1,380.000 <img src="omr_icon.svg" class="currency-icon" alt="ر.ع"></strong></div>
                                    <div class="col-6">العوائد الموزعة: <strong>70.000 <img src="omr_icon.svg" class="currency-icon" alt="ر.ع"></strong></div>
                                    <div class="col-12 border-top pt-2 mt-2">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="h5 mb-0 fw-800">إجمالي مبلغ التصفية:</span>
                                            <strong class="h4 mb-0 text-spf-dark fw-800">1,450.000 <img src="omr_icon.svg" class="currency-icon" alt="ر.ع"></strong>
                                        </div>
                                    </div>
                                </div>
                                <div class="row g-3 align-items-end">
                                    <div class="col-md-8">
                                        <label class="form-label small fw-700">حساب تحويل التسوية</label>
                                        <select class="form-select form-select-sm">
                                            <option>بنك مسقط - ****9876</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <button class="btn btn-danger btn-sm w-100 fw-800" onclick="submitExit()">تأكيد وإغلاق</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const role = localStorage.getItem('spf-user-role') || 'saver';
            if (role !== 'saver') {
                document.body.innerHTML = '<div class="container mt-5 text-center"><div class="alert alert-warning">عذراً، طلب الخروج مخصص للمدخرين الأفراد فقط.</div><a href="01-dashboard.html" class="btn btn-spf">العودة للوحة التحكم</a></div>';
            }
        });

        function submitExit() {
            if(!document.getElementById('confirmExit').checked) {
                spf.showError('يرجى الموافقة على الإقرار للمتابعة.');
                return;
            }
            spf.showSuccess('تم استلام طلب الخروج من النظام. سيتم معالجة الطلب وتحويل المبلغ النهائي إلى حسابك البنكي خلال 5 أيام عمل.');
            setTimeout(() => {
                window.location.href = '01-dashboard.html';
            }, 3000);
        }

        // Initialize inquiries
        document.addEventListener('DOMContentLoaded', function() {
            spf.renderInquiries([
                "ما هي ضوابط الخروج من الصندوق؟"
            ]);
        });
    </script>
</body>
</html>
